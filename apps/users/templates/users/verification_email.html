<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Your Email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f6f8; font-family: Arial, sans-serif; color: #1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f4f6f8; padding: 24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 600px; background: #ffffff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb;">
          <tr>
            <td style="background: #0f766e; padding: 22px 24px; text-align: center;">
              <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: 700;">config</h1>
            </td>
          </tr>
          <tr>
            <td style="padding: 28px 24px;">
              <p style="margin: 0 0 14px; font-size: 16px; line-height: 1.6;">Hi {{ user.username }},</p>
              <p style="margin: 0 0 20px; font-size: 15px; line-height: 1.7; color: #374151;">
                Thanks for signing up. Please verify your email address by clicking the button below.
              </p>

              <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 0 0 20px;">
                <tr>
                  <td style="border-radius: 8px; background: #0f766e; text-align: center;">
                    <a href="{{ verification_url }}" style="display: inline-block; padding: 12px 20px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 700;">
                      Verify Email Address
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin: 0; font-size: 13px; color: #6b7280; line-height: 1.6;">
                If you did not create this account, you can ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
